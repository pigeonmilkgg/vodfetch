# Hinweis: Die entfernten nicht-englischen Streamer-Seiten liefern bewusst 404.
# Ein Sammel-Redirect auf /streamer wäre ein Soft-404-Muster (Google wertet
# Massen-Weiterleitungen entfernter URLs auf eine generische Seite ohnehin ab);
# der 404 ist das saubere "diese Seite existiert nicht mehr"-Signal.

# Markdown-Versionen korrekt als text/markdown ausliefern (für LLMs/AI-Crawler)
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    X-Robots-Tag = "all"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
