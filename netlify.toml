# Netlify-Konfiguration für die statische Twitch-Downloader-Seite.
# Build:  TWITCHDL_BASE_URL="https://DEINE-DOMAIN" python build_static.py
# Deploy: netlify deploy --prod   (publish-Ordner = dist)

[build]
  publish = "dist"
  command = "pip install -r requirements.txt && TWITCHDL_BASE_URL=\"$URL\" python build_static.py"

[build.environment]
  PYTHON_VERSION = "3.11"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Sauberer Proxy-Pfad für den Browser-Downloader (CORS-Proxy nur für Twitch-Hosts)
[[redirects]]
  from = "/api/tw"
  to = "/.netlify/functions/tw"
  status = 200
  force = true

# Englisch lebt auf der Root — /en* sauber dorthin umleiten (SEO: keine Duplicate Content)
[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/en"
  to = "/"
  status = 301
  force = true

# Stillgelegte Sprachversionen (2026-07-19): Die 13 maschinell übersetzten Sprachen
# waren 86% der Site und der Hauptgrund für AdSense "minderwertige Inhalte" + Googles
# "crawled – currently not indexed". Statt harter 404s leiten wir per 301 auf die
# englische Entsprechung um: gleiche Bereinigung, aber Link-Equity und Lesezeichen
# bleiben erhalten. Reaktivierbar über TWITCHDL_LANGS (siehe twitchdl/i18n.py).
